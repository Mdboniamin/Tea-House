<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea house</title>
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- banner section starts here -->
    <div
        class="parent_div flex flex-col md:flex-row justify-center items-center min-h-[200px] max-w-[1250px] mx-auto">
        <div class="left_div">
            <h1 class="text-[80px] font-bold">It's good<br>tea time at The<br>Tea House</h1>
            <p class="text-[18px] my-7">Tea and Botanical Solutions Supplier Give Optimum<br> Satisfaction To Your Taste
                Buds.</p>
            <button class="w-[200px] text-xl text-white rounded-[10px] h-[64px] bg-[linear-gradient(270deg,#FF0000_0%,#FF8938_100%)]">Explore More <span><i class="fa-solid fa-arrow-right -rotate-45"></i></span></button>
        </div>

        <div class="right_div relative">
            <img src="images/banner.png" class="relative top-[100px]" alt="">
            <div class="bg-white flex items-center w-[255px] h-[100px] rounded-lg shadow-md absolute left-24">
                <span class="text-4xl"><i class="fa-solid fa-star"></i></span>
                <div class="ml-4">
                    <p class="text-4xl font-bold">5.00</p>
                    <p>Trust Pilot Ratings</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
